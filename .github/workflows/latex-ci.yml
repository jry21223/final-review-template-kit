name: LaTeX CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-templates:
    name: Build XeLaTeX templates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            texlive-xetex \
            texlive-lang-chinese \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-noto-cjk \
            fonts-dejavu

      - name: Compile review notes template
        run: latexmk -xelatex -interaction=nonstopmode -halt-on-error templates/final-review-notes-template.tex

      - name: Compile mock exam template
        run: latexmk -xelatex -interaction=nonstopmode -halt-on-error templates/final-mock-exam-template.tex

      - name: Upload rendered PDFs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rendered-template-pdfs
          path: |
            templates/*.pdf
            templates/*.log
          if-no-files-found: ignore
